name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mac-arm64
            os: macos-15
            arch: arm64
          - target: mac-x64
            os: macos-15-intel
            arch: x64
          - target: windows-x64
            os: windows-latest
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Verify autonomous Research contracts and artifacts
        run: npm run verify:research

      - name: Verify autonomous Research library matrix
        run: npm run verify:research-seed

      - name: Verify update version selection
        run: npm run verify:update-version

      - name: Verify release identity and packaging contract
        run: npm run release:check

      - name: Build app bundles
        run: npm run build

      - name: Package macOS
        if: startsWith(matrix.target, 'mac-')
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Package Windows
        if: matrix.target == 'windows-x64'
        run: npx electron-builder --win --x64 --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: akorith-${{ matrix.target }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: error
          retention-days: 14

  publish:
    name: publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
