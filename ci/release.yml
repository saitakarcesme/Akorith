name: release

# Build Akorith release artifacts for macOS and Windows.
#
# Triggers:
#   - manual run (workflow_dispatch), optionally creating a DRAFT release
#   - pushing a version tag (v*), which uploads artifacts and creates a draft release
#
# Builds are UNSIGNED unless signing secrets are configured (see notes at bottom).
# No secrets are required for the default unsigned build.

on:
  workflow_dispatch:
    inputs:
      draft_release:
        description: 'Create a draft GitHub Release with the artifacts'
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: akorith-macos
          - os: windows-latest
            artifact: akorith-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (renderer/main/preload)
        run: npm run build

      - name: Package macOS (dmg + zip)
        if: matrix.os == 'macos-latest'
        # Unsigned: disable auto code-sign discovery so the build never fails on a missing cert.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Package Windows (nsis + portable)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
          if-no-files-found: warn
          retention-days: 14

  draft-release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    # Only when a tag was pushed, or the manual run explicitly asked for a draft.
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.draft_release == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Akorith dev build' }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'untagged-dev' }}
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# --- Signing / notarization (future, optional) ---------------------------------
# macOS: add Apple Developer secrets (CSC_LINK / CSC_KEY_PASSWORD) and notarization
#   (APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID), then remove
#   CSC_IDENTITY_AUTO_DISCOVERY: false from the macOS step.
# Windows: add an Authenticode cert (CSC_LINK / CSC_KEY_PASSWORD).
# Until then, artifacts are unsigned and Gatekeeper/SmartScreen will warn.
